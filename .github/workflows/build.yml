name: build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install dependencies (ubuntu only)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxslt1.1 libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.18.0'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.11.0
          run_install: false

      - name: Pnpm Cache
        uses: actions/cache@v6
        with:
          path: ~/.pnpm-store
          key: 'pnpm-${{ matrix.os }}-${{ matrix.target }}'
          restore-keys: pnpm-${{ matrix.os }}-${{ matrix.target }}

      - name: Cache Cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: 'rust-${{ matrix.os }}-${{ matrix.target }}'
          restore-keys: 'rust-${{ matrix.os }}-${{ matrix.target }}'

      - name: Install dependencies
        run: pnpm install --dangerously-allow-all-builds

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri bundle
        run: pnpm tauri build

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: seraphine-music-${{ matrix.os }}
          path: src-tauri/target/release/bundle/**

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./bundles

      - name: Create GitHub Release and upload bundles
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: bundles/**
          token: ${{ secrets.GITHUB_TOKEN }}
